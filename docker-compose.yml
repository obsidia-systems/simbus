# simbus — Industrial Field Device Simulator
#
# Runs a full lab of 7 virtual Modbus TCP devices, each in its own container.
# Every container exposes:
#   - A Modbus TCP server  (port 50xx on the host)
#   - A REST control API   (port 80xx on the host)
#
# Usage:
#   docker compose up                        # all devices
#   docker compose up tnh-sensor crac        # specific devices
#   docker compose up --profile power        # power-related group
#
# Port map:
#   tnh-sensor    Host 5020 -> Container 502    API 8000 -> 8000
#   ups           Host 5021 -> Container 502    API 8001 -> 8000
#   pdu           Host 5022 -> Container 502    API 8002 -> 8000
#   crac          Host 5023 -> Container 502    API 8003 -> 8000
#   power-meter   Host 5024 -> Container 502    API 8004 -> 8000
#   leak-sensor   Host 5025 -> Container 502    API 8005 -> 8000
#   door-contact  Host 5026 -> Container 502    API 8006 -> 8000
#   papouch-th2e  Host 551x -> Container 512    API 810x -> 8000

x-simbus-defaults: &simbus-defaults
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  restart: unless-stopped
  cap_add:
    - NET_BIND_SERVICE
  networks:
    - simbus

services:

  # ── Environmental sensors ──────────────────────────────────────────────────

  tnh-sensor:
    <<: *simbus-defaults
    container_name: simbus-tnh-sensor
    environment:
      SIMBUS_DEVICE_TYPE: generic-tnh-sensor
      SIMBUS_TICK_INTERVAL: "1.0"
    ports:
      - "5020:502"    # Modbus TCP
      - "8000:8000"   # REST API
    profiles: ["env", "all"]

  leak-sensor:
    <<: *simbus-defaults
    container_name: simbus-leak-sensor
    environment:
      SIMBUS_DEVICE_TYPE: generic-leak-sensor
      SIMBUS_TICK_INTERVAL: "1.0"
    ports:
      - "5025:502"
      - "8005:8000"
    profiles: ["env", "all"]

  door-contact:
    <<: *simbus-defaults
    container_name: simbus-door-contact
    environment:
      SIMBUS_DEVICE_TYPE: generic-door-contact
      SIMBUS_TICK_INTERVAL: "1.0"
    ports:
      - "5026:502"
      - "8006:8000"
    profiles: ["env", "all"]

  # ── Cooling ────────────────────────────────────────────────────────────────

  crac:
    <<: *simbus-defaults
    container_name: simbus-crac
    environment:
      SIMBUS_DEVICE_TYPE: generic-crac
      SIMBUS_TICK_INTERVAL: "1.0"
    ports:
      - "5023:502"
      - "8003:8000"
    profiles: ["cooling", "all"]

  # ── Power ──────────────────────────────────────────────────────────────────

  ups:
    <<: *simbus-defaults
    container_name: simbus-ups
    environment:
      SIMBUS_DEVICE_TYPE: generic-ups
      SIMBUS_TICK_INTERVAL: "1.0"
    ports:
      - "5021:502"
      - "8001:8000"
    profiles: ["power", "all"]

  pdu:
    <<: *simbus-defaults
    container_name: simbus-pdu
    environment:
      SIMBUS_DEVICE_TYPE: generic-pdu
      SIMBUS_TICK_INTERVAL: "1.0"
    ports:
      - "5022:502"
      - "8002:8000"
    profiles: ["power", "all"]

  power-meter:
    <<: *simbus-defaults
    container_name: simbus-power-meter
    environment:
      SIMBUS_DEVICE_TYPE: generic-power-meter
      SIMBUS_TICK_INTERVAL: "1.0"
    ports:
      - "5024:502"
      - "8004:8000"
    profiles: ["power", "all"]

  # -- Custom device example (uncomment to enable) --------------------------------
  papouch-th2e-01:
    <<: *simbus-defaults
    container_name: simbus-papouch-th2e-01
    volumes:
    - ./devices:/app/devices:ro   # monta en tiempo de ejecución, sin rebuild
    environment:
      SIMBUS_YAML_PATH: "/app/devices/papouch-th2e.yaml"
    ports:
      - "5512:512"
      - "8100:8000"
    profiles: ["custom", "all"]

  papouch-th2e-02:
    <<: *simbus-defaults
    container_name: simbus-papouch-th2e-02
    volumes:
    - ./devices:/app/devices:ro   # monta en tiempo de ejecución, sin rebuild
    environment:
      SIMBUS_YAML_PATH: "/app/devices/papouch-th2e.yaml"
    ports:
      - "5513:512"
      - "8101:8000"
    profiles: ["custom", "all"]

  papouch-th2e-03:
    <<: *simbus-defaults
    container_name: simbus-papouch-th2e-03
    volumes:
    - ./devices:/app/devices:ro   # monta en tiempo de ejecución, sin rebuild
    environment:
      SIMBUS_YAML_PATH: "/app/devices/papouch-th2e.yaml"
    ports:
      - "5514:512"
      - "8102:8000"
    profiles: ["custom", "all"]

  papouch-th2e-04:
    <<: *simbus-defaults
    container_name: simbus-papouch-th2e-04
    volumes:
    - ./devices:/app/devices:ro   # monta en tiempo de ejecución, sin rebuild
    environment:
      SIMBUS_YAML_PATH: "/app/devices/papouch-th2e.yaml"
    ports:
      - "5515:512"
      - "8103:8000"
    profiles: ["custom", "all"]

networks:
  simbus:
    driver: bridge
