name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check
        run: uv run ruff check simbus tests

      - name: Run ruff format check
        run: uv run ruff format --check simbus tests

      - name: Run mypy
        run: uv run mypy simbus

      - name: Run tests with coverage
        run: uv run pytest -v --cov=simbus --cov-report=term-missing --cov-fail-under=95
